# HIVE Deployment Template
# All vars with documented upstream defaults are listed below.
# Environment-specific values are read from .env (gitignored).
# Copy .env.example to .env and fill in your values, or let defaults apply.
#
# COMPOSE vs .ENV RULES:
#   - Compose lists ALL documented env vars with upstream defaults.
#   - .env provides your actual values (overrides only differ from defaults).
#   - Required secrets (DISCORD_TOKEN, etc.) live in .env only.
#
# Usage:
#   docker compose up -d
#   docker compose config                   # validate without running

services:
  hive:
    build:
      context: ..         # path to your cloned HIVE repo
      dockerfile: deployment/Dockerfile
    container_name: hive

    env_file:
      - .env
    environment:
      # ── Model ────────────────────────────────────────────────────────────────
      # Inference model for main HIVE agent. Default: qwen3.5:35b.
      HIVE_MODEL:            ${HIVE_MODEL:-qwen3.5:35b}
      # Glasses platform model (Meta Ray-Ban smart glasses). Default: qwen3.5:35b.
      HIVE_GLASSES_MODEL:    ${HIVE_GLASSES_MODEL:-qwen3.5:35b}
      # LLM provider backend. Options: ollama, openai, anthropic, gemini, xai.
      # Default: ollama.
      HIVE_PROVIDER:         ${HIVE_PROVIDER:-ollama}
      # Ollama server URL. Default: http://localhost:11434.
      HIVE_OLLAMA_URL:       ${HIVE_OLLAMA_URL:-http://localhost:11434}
      # Alias for HIVE_OLLAMA_URL (used by some subsystems). Default: http://localhost:11434.
      OLLAMA_HOST:           ${OLLAMA_HOST:-http://localhost:11434}
      # Ollama parallelism. Set to 1 for models that don't support parallel requests.
      # Default: 1.
      OLLAMA_NUM_PARALLEL:   ${OLLAMA_NUM_PARALLEL:-1}
      # Ollama request queue depth. Default: 32.
      OLLAMA_MAX_QUEUE:      ${OLLAMA_MAX_QUEUE:-32}
      # KV cache quantization type. Options: f16 (default), q4_0, q4_1, q8_0, q5_0, q5_1.
      # q4_0 saves ~1 GB VRAM on 6 GB cards. Default: unset (f16).
      OLLAMA_KV_CACHE_TYPE:  ${OLLAMA_KV_CACHE_TYPE:-q4_0}

      # ── HIVE Core ───────────────────────────────────────────────────────────
      # Max concurrent ReAct loops. Default: 2.
      HIVE_MAX_PARALLEL:     ${HIVE_MAX_PARALLEL:-2}
      # Python binary for image generation / training scripts. Default: python3.
      HIVE_PYTHON_BIN:       ${HIVE_PYTHON_BIN:-python3}
      # Rust log level. Options: error, warn, info, debug, trace. Default: info.
      RUST_LOG:              ${RUST_LOG:-info}

      # ── Sleep Training ───────────────────────────────────────────────────────
      # Micro-batch size for identity reflection. Default: 2.
      # Set to 1 for smaller models prone to thinking-dominant responses.
      HIVE_SLEEP_BATCH:      ${HIVE_SLEEP_BATCH:-2}
      # Auto-sleep interval in seconds. Default: 43200 (12 hours).
      HIVE_SLEEP_INTERVAL:   ${HIVE_SLEEP_INTERVAL:-43200}
      # Micro-training learning rate. Default: 1e-5.
      HIVE_SLEEP_LR:         ${HIVE_SLEEP_LR:-1e-5}

      # ── Identity & Networking ─────────────────────────────────────────────────
      # Display name for P2P mesh. Default: anonymous.
      HIVE_USER_NAME:         ${HIVE_USER_NAME:-anonymous}
      # Enable P2P human mesh (toggles NeuroLease discovery). Default: unset (disabled).
      HIVE_HUMAN_MESH:       ${HIVE_HUMAN_MESH:-}
      # P2P mesh listen port. Default: 9877.
      HIVE_HUMAN_MESH_PORT:   ${HIVE_HUMAN_MESH_PORT:-9877}

      # ── Paths & Ports ────────────────────────────────────────────────────────
      # Image cache directory. Default: memory/cache/images.
      HIVE_CACHE_DIR:        ${HIVE_CACHE_DIR:-memory/cache/images}
      # File server HTTP port. Default: 8420.
      HIVE_FILE_SERVER_PORT: ${HIVE_FILE_SERVER_PORT:-8420}

    # ── Volumes ───────────────────────────────────────────────────────────────
    volumes:
      # Model weights persist across container rebuilds
      - ollama-models:/ollama-models
      # HIVE memory / SQLite / logs persist
      - hive-data:/app/data
      - hive-logs:/app/logs
      # Agent memory store — working memory, timeline, synaptic graph, etc.
      - hive-memory:/app/memory

    # ── Network ───────────────────────────────────────────────────────────────
    networks:
      - hive-net
    # No ports exposed to host — HIVE talks outbound only (Discord API, web search).
    # If you later want the Axum WebSocket API accessible on your host, uncomment:
    # ports:
    #   - "127.0.0.1:8080:8080"   # bind localhost only, never 0.0.0.0

    # ── Resource limits ───────────────────────────────────────────────────────
    # NOTE: These are hardware-specific. Adjust to your machine.
    #       qwen3:32b needs ~24 GB RAM for Q4 quant.
    deploy:
      resources:
        limits:
          memory: 48g
          cpus: "16"

    # ── Security hardening ────────────────────────────────────────────────────
    # Drop ALL Linux capabilities then add back only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # needed to bind privileged ports
      - CHOWN              # needed by entrypoint to fix volume ownership
      - DAC_OVERRIDE       # needed to execute files
      - SETUID             # needed by gosu to switch to hive user
      - SETGID             # needed by gosu to switch to hive group

    security_opt:
      - no-new-privileges:true   # prevents sudo / setuid escalation

    # Read-only root filesystem — HIVE writes go through named volumes only.
    # Comment this out if the build fails (some Rust crates write to /tmp at runtime).
    # read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777

    # ── Restart policy ────────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Healthcheck ──────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 180s   # model pull can take time on first boot
      retries: 3

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  ollama-models:
    driver: local
  hive-data:
    driver: local
  hive-logs:
    driver: local
  hive-memory:
    driver: local

# ── Network: internet-capable but LAN-isolated ────────────────────────────────
networks:
  hive-net:
    driver: bridge
    # Do NOT add `internal: true` — HIVE needs internet for Discord + web search.
    # LAN isolation is handled at the OS firewall level (see README).
    ipam:
      config:
        - subnet: 172.28.0.0/16
