# ══════════════════════════════════════════════════════════════════════
#  🐝 HIVE — Docker Compose (One-Click Launch)
# ══════════════════════════════════════════════════════════════════════
# Uses your HOST's Ollama — Docker doesn't have GPU access on macOS.
# Make sure Ollama is running before starting HIVE.
#
# Usage: docker compose up
# Or just run: ./launch.sh
# ══════════════════════════════════════════════════════════════════════

services:
  hive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hive-mesh
    restart: unless-stopped

    ports:
      - "3030:3030"   # Panopticon (Engine Visualizer)
      - "3031:3031"   # Apis Book (AI Activity Dashboard)
      - "3032:3032"   # HiveSurface (Social Media)
      - "3033:3033"   # Apis Code (Web IDE)
      - "3034:3034"   # HiveChat (Discord Clone)
      - "3035:3035"   # HivePortal (Mesh Homepage) ← MAIN ENTRY
      - "8421:8421"   # File Server
      - "8422:8422"   # Glasses WebSocket
      - "8480:8480"   # Web Proxy

    volumes:
      - hive-memory:/home/hive/memory       # Persistent memory
      - hive-data:/home/hive/.hive           # Keys and config

    environment:
      - HIVE_AUTO_OPEN=false
      # Connect to host's Ollama — host.docker.internal resolves to your machine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - HIVE_MODEL=qwen2.5:7b
      - RUST_LOG=HIVE=info

    # Allow container to reach host services (Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # GPU support (Linux only — macOS Docker doesn't support GPU passthrough)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  hive-memory:
    name: hive-memory
  hive-data:
    name: hive-data
